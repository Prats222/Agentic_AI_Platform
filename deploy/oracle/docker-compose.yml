services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: src/AgenticPlatform.API/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Provider: PostgreSql
      Database__EnsureCreated: "true"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      JwtSettings__Issuer: PratsPilot
      JwtSettings__Audience: PratsPilot.Web
      JwtSettings__Secret: ${JWT_SECRET}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN}
      RateLimiting__PermitLimit: ${RATE_LIMIT_PER_MINUTE}
      RateLimiting__WindowSeconds: "60"
      RateLimiting__QueueLimit: "0"
    volumes:
      - api-context-data:/app/App_Data/context-documents
      - api-logs:/app/logs
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  api-context-data:
  api-logs:
